<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archive — Music Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    img {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      pointer-events: none;
    }

    /* Re-enable pointer events only on clickable wrappers, not the img itself */
    .masonry-item, .grid-item, .lb-strip-item, .lb-arrow {
      pointer-events: auto;
    }

    :root {
      --bg: #111010;
      --surface: #191817;
      --ink: #e8e4de;
      --muted: #5a5753;
      --dim: #2e2c2a;
      --accent: #d4a96a;
      --gap: 3px;
    }

    html {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Cormorant', Georgia, serif;
      font-size: 16px;
      scrollbar-color: var(--dim) var(--bg);
      scrollbar-width: thin;
    }

    body { min-height: 100vh; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px;
    }

    /* ─── HEADER ────────────────────────────── */
    header {
      padding: 1.8rem 2rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(17,16,16,0.93);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--dim);
    }

    .site-title {
      font-family: 'Cormorant', serif;
      font-weight: 300;
      font-size: 1.05rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .site-title em {
      font-style: italic;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: none;
      margin-left: 0.5rem;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.4rem;
    }

    .photo-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .view-toggle { display: flex; gap: 0.4rem; }

    .toggle-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 5px;
      line-height: 0;
      transition: color 0.2s;
      border-radius: 2px;
    }
    .toggle-btn:hover { color: var(--ink); }
    .toggle-btn.active { color: var(--ink); }

    /* ─── MASONRY ───────────────────────────── */
    #masonry {
      columns: 4 200px;
      column-gap: var(--gap);
      padding: var(--gap);
    }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: var(--gap);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: block;
      background: var(--surface);
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
    }

    .masonry-item img {
      display: block;
      width: 100%;
      height: auto;
      transition: transform 0.55s cubic-bezier(0.25,0,0,1), filter 0.4s ease;
      filter: brightness(0.85) saturate(0.6);
    }

    .masonry-item:hover img {
      transform: scale(1.05);
      filter: brightness(1) saturate(1);
    }

    .item-caption { display: none; }

    .cap-title {
      font-family: 'Cormorant', serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: #fff;
      line-height: 1.2;
    }

    .cap-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.57rem;
      color: rgba(255,255,255,0.42);
      margin-top: 0.3rem;
      letter-spacing: 0.06em;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── UNIFORM GRID ──────────────────────── */
    #grid-view {
      display: none;
      padding: var(--gap);
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: var(--gap);
    }

    #grid-view.active { display: grid; }

    .grid-item {
      cursor: pointer;
      overflow: hidden;
      aspect-ratio: 3/2;
      background: var(--surface);
      position: relative;
      opacity: 0;
      animation: fadeIn 0.45s ease forwards;
    }

    .grid-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.55s cubic-bezier(0.25,0,0,1), filter 0.4s;
      filter: brightness(0.85) saturate(0.6);
    }

    .grid-item:hover img {
      transform: scale(1.05);
      filter: brightness(1) saturate(1);
    }



    /* ─── LIGHTBOX ──────────────────────────── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #0a0908;
      flex-direction: column;
    }

    #lightbox.open { display: flex; }

    .lb-top {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0.9rem 1.4rem;
      flex-shrink: 0;
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      background: linear-gradient(rgba(10,9,8,0.7), transparent);
    }

    .lb-controls { display: flex; align-items: center; gap: 1.2rem; }
    .lb-counter {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.08em;
    }
    .lb-btn {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.35); padding: 6px; line-height: 0;
      transition: color 0.15s;
    }
    .lb-btn:hover { color: var(--ink); }

    /* Fixed info overlay at bottom of lightbox image area */
    .lb-info-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 4rem 2rem 1.8rem;
      background: linear-gradient(transparent, rgba(10,9,8,0.85));
      pointer-events: none;
      z-index: 10;
    }

    .lb-title {
      font-family: 'Cormorant', serif;
      font-size: 1.45rem;
      font-weight: 300;
      font-style: italic;
      color: #fff;
      line-height: 1.1;
    }
    .lb-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.4);
      margin-top: 0.4rem;
      letter-spacing: 0.07em;
    }

    .lb-stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 5rem 5rem;
      position: relative;
      min-height: 0;
    }

    #lb-img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      display: block;
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    #lb-img.loaded { opacity: 1; }

    .lb-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--dim); padding: 1rem; line-height: 0;
      transition: color 0.2s;
    }
    .lb-arrow:hover { color: rgba(255,255,255,0.7); }
    .lb-arrow.prev { left: 0.5rem; }
    .lb-arrow.next { right: 0.5rem; }

    .lb-bottom {
      padding: 0.9rem 1.8rem 1.1rem;
      display: flex;
      justify-content: center;
      gap: 3px;
      flex-shrink: 0;
      overflow-x: auto;
      border-top: 1px solid var(--dim);
    }

    .lb-strip-item {
      width: 46px; height: 30px;
      object-fit: cover;
      opacity: 0.22;
      cursor: pointer;
      transition: opacity 0.15s;
      flex-shrink: 0;
      border: 1px solid transparent;
    }
    .lb-strip-item:hover { opacity: 0.6; }
    .lb-strip-item.active {
      opacity: 1;
      border-color: var(--accent);
    }

    /* ─── FOOTER ────────────────────────────── */
    footer {
      padding: 1.5rem 2rem;
      border-top: 1px solid var(--dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-text {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      header { padding: 1.2rem; }
      #masonry { columns: 2 130px; }
      .lb-stage { padding: 1rem 3rem; }
      .lb-bottom { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="site-title">Archive<em>— Music Photography</em></div>
    <div class="header-right">
      <span class="photo-count" id="photo-count">— photos</span>
      <div class="view-toggle">
        <button class="toggle-btn active" id="btn-masonry" title="Masonry" onclick="setView('masonry')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3">
            <rect x="1" y="1" width="5" height="8" rx="0.3"/>
            <rect x="9" y="1" width="5" height="4" rx="0.3"/>
            <rect x="1" y="11" width="5" height="4" rx="0.3"/>
            <rect x="9" y="7" width="5" height="8" rx="0.3"/>
          </svg>
        </button>
        <button class="toggle-btn" id="btn-grid" title="Grid" onclick="setView('grid')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3">
            <rect x="1" y="1" width="5" height="5" rx="0.3"/>
            <rect x="9" y="1" width="5" height="5" rx="0.3"/>
            <rect x="1" y="9" width="5" height="5" rx="0.3"/>
            <rect x="9" y="9" width="5" height="5" rx="0.3"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div id="masonry"></div>
  <div id="grid-view"></div>

  <div id="lightbox">
    <div class="lb-top">
      <div class="lb-controls">
        <span class="lb-counter" id="lb-counter">1 / 1</span>
        <button class="lb-btn" onclick="closeLightbox()">
          <svg width="17" height="17" viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="1.4">
            <line x1="3" y1="3" x2="14" y2="14"/><line x1="14" y1="3" x2="3" y2="14"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="lb-stage">
      <button class="lb-arrow prev" onclick="navigate(-1)">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="1.3">
          <polyline points="16,5 8,13 16,21"/>
        </svg>
      </button>
      <img id="lb-img" src="" alt="" />
      <button class="lb-arrow next" onclick="navigate(1)">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="1.3">
          <polyline points="10,5 18,13 10,21"/>
        </svg>
      </button>
      <div class="lb-info-overlay">
        <div class="lb-title" id="lb-title">—</div>
        <div class="lb-sub" id="lb-sub">—</div>
      </div>
    </div>
    <div class="lb-bottom" id="lb-strip"></div>
  </div>

  <footer>
    <span class="footer-text">Music Photography Archive</span>
    <span class="footer-text" id="footer-year"></span>
  </footer>

<script>
  // ── DATA ─────────────────────────────────────────────────────────────────────
  // Add your images: replace `src` with real file paths e.g. "images/show-01.jpg"
  // `aspect` controls masonry height variation — remove when using real images
  const PHOTOS = [
    { title: "The National", venue: "Hollywood Bowl, Los Angeles", date: "2023", src: "", aspect: "3/2" },
    { title: "Phoebe Bridgers", venue: "The Wiltern, Los Angeles", date: "2022", src: "", aspect: "2/3" },
    { title: "Angel Olsen", venue: "Ace Hotel, Los Angeles", date: "2022", src: "", aspect: "4/3" },
    { title: "Nick Cave", venue: "Shrine Auditorium", date: "2023", src: "", aspect: "3/4" },
    { title: "Mitski", venue: "Greek Theatre, Los Angeles", date: "2023", src: "", aspect: "3/2" },
    { title: "Weyes Blood", venue: "Teragram Ballroom", date: "2021", src: "", aspect: "2/3" },
    { title: "Coachella — Weekend 1", venue: "Empire Polo Club, Indio", date: "2023", src: "", aspect: "16/9" },
    { title: "Radiohead", venue: "Forum, Los Angeles", date: "2019", src: "", aspect: "3/2" },
    { title: "Caroline Polachek", venue: "Palace Theatre", date: "2023", src: "", aspect: "2/3" },
    { title: "FKA Twigs", venue: "Hollywood Palladium", date: "2022", src: "", aspect: "3/4" },
    { title: "Hand Habits", venue: "Lodge Room, Los Angeles", date: "2021", src: "", aspect: "3/2" },
    { title: "Stagecoach", venue: "Empire Polo Club, Indio", date: "2022", src: "", aspect: "16/9" },
    { title: "Perfume Genius", venue: "Orpheum Theatre", date: "2022", src: "", aspect: "3/2" },
    { title: "Japanese Breakfast", venue: "Hollywood Bowl", date: "2022", src: "", aspect: "2/3" },
    { title: "Big Thief", venue: "Novo by Microsoft", date: "2021", src: "", aspect: "3/4" },
    { title: "Grouper", venue: "Zebulon, Los Angeles", date: "2022", src: "", aspect: "3/2" },
  ];

  function makePlaceholder(aspect, i) {
    const [w, h] = aspect.split('/').map(Number);
    const pw = Math.round(w * 280), ph = Math.round(h * 280);
    const tones = ['1c1a18','1f1d1b','181716','201e1c','1a1917','222019'];
    const bg = tones[i % tones.length];
    return `data:image/svg+xml,${encodeURIComponent(
      `<svg xmlns='http://www.w3.org/2000/svg' width='${pw}' height='${ph}'>` +
      `<rect width='100%' height='100%' fill='%23${bg}'/>` +
      `<line x1='0' y1='0' x2='${pw}' y2='${ph}' stroke='%23ffffff07' stroke-width='1'/>` +
      `<line x1='${pw}' y1='0' x2='0' y2='${ph}' stroke='%23ffffff07' stroke-width='1'/>` +
      `</svg>`
    )}`;
  }

  function imgSrc(p, i) { return p.src || makePlaceholder(p.aspect || '3/2', i); }

  let currentView = 'masonry';
  let lbIndex = 0;

  document.getElementById('footer-year').textContent = new Date().getFullYear();
  document.getElementById('photo-count').textContent = `${PHOTOS.length} photos`;
  renderMasonry();
  renderGrid();

  function renderMasonry() {
    document.getElementById('masonry').innerHTML = PHOTOS.map((p, i) => `
      <div class="masonry-item" style="animation-delay:${(i * 0.03).toFixed(2)}s" onclick="openLightbox(${i})">
        <img src="${imgSrc(p,i)}" alt="${p.title}" loading="lazy" style="aspect-ratio:${p.aspect||'3/2'}" />
        <div class="item-caption">
          <div class="cap-title">${p.title}</div>
          <div class="cap-sub">${p.venue}&nbsp;·&nbsp;${p.date}</div>
        </div>
      </div>`).join('');
  }

  function renderGrid() {
    document.getElementById('grid-view').innerHTML = PHOTOS.map((p, i) => `
      <div class="grid-item" style="animation-delay:${(i * 0.025).toFixed(2)}s" onclick="openLightbox(${i})">
        <img src="${imgSrc(p,i)}" alt="${p.title}" loading="lazy" />
        <div class="item-caption">
          <div class="cap-title">${p.title}</div>
          <div class="cap-sub">${p.venue}&nbsp;·&nbsp;${p.date}</div>
        </div>
      </div>`).join('');
  }

  function setView(v) {
    currentView = v;
    document.getElementById('masonry').style.display = v === 'masonry' ? '' : 'none';
    document.getElementById('grid-view').classList.toggle('active', v === 'grid');
    document.getElementById('btn-masonry').classList.toggle('active', v === 'masonry');
    document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
  }

  function openLightbox(i) {
    lbIndex = i;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
    updateLightbox();
    renderStrip();
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function navigate(dir) {
    lbIndex = (lbIndex + dir + PHOTOS.length) % PHOTOS.length;
    updateLightbox(); syncStrip();
  }

  function updateLightbox() {
    const p = PHOTOS[lbIndex];
    const img = document.getElementById('lb-img');
    img.classList.remove('loaded');
    img.src = imgSrc(p, lbIndex);
    img.onload = () => img.classList.add('loaded');
    document.getElementById('lb-title').textContent = p.title;
    document.getElementById('lb-sub').textContent = `${p.venue}  ·  ${p.date}`;
    document.getElementById('lb-counter').textContent = `${lbIndex + 1} / ${PHOTOS.length}`;
  }

  function renderStrip() {
    document.getElementById('lb-strip').innerHTML = PHOTOS.map((p, i) => `
      <img class="lb-strip-item${i === lbIndex ? ' active' : ''}"
        src="${imgSrc(p,i)}"
        onclick="lbIndex=${i};updateLightbox();syncStrip()"
        loading="lazy" alt="${p.title}" />`).join('');
  }

  function syncStrip() {
    document.querySelectorAll('.lb-strip-item').forEach((el, i) => el.classList.toggle('active', i === lbIndex));
    const a = document.querySelector('.lb-strip-item.active');
    if (a) a.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
  }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
  });

  // ── IMAGE PROTECTION ─────────────────────────────────────────────────────────
  // Block right-click context menu on images
  document.addEventListener('contextmenu', e => {
    if (e.target.tagName === 'IMG') e.preventDefault();
  });

  // Block drag-to-desktop on images
  document.addEventListener('dragstart', e => {
    if (e.target.tagName === 'IMG') e.preventDefault();
  });

  // Block long-press save on touch devices
  document.addEventListener('touchstart', e => {
    if (e.target.tagName === 'IMG') e.target.style.webkitUserSelect = 'none';
  }, { passive: true });
</script>
</body>
</html>
